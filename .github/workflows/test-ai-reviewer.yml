name: "Code Review by Amazon Bedrock"

on:
  pull_request:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Get the diff of the pull request
      - name: "Get diff of the pull request"
        id: get_diff
        shell: bash
        env:
          PULL_REQUEST_HEAD_REF: "${{ github.event.pull_request.head.ref }}"
          PULL_REQUEST_BASE_REF: "${{ github.event.pull_request.base.ref }}"
        run: |-
          git fetch origin "${{ env.PULL_REQUEST_HEAD_REF }}"
          git fetch origin "${{ env.PULL_REQUEST_BASE_REF }}"
          git checkout "${{ env.PULL_REQUEST_HEAD_REF }}"
          git diff "origin/${{ env.PULL_REQUEST_BASE_REF }}" > "diff.txt"
          {
            echo "pull_request_diff<<EOF";
            cat "diff.txt";
            echo 'EOF';
          } >> $GITHUB_OUTPUT

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Run Bedrock Review Script
      - name: "Run Bedrock Review Script"
        id: run_review
        env:
          PR_DIFF: ${{ steps.get_diff.outputs.pull_request_diff }}
          BEDROCK_API_KEY: ${{ secrets.BEDROCK_API_KEY }}
          BEDROCK_BASE_URL: ${{ secrets.BEDROCK_BASE_URL }}
        run: |
          pip install requests
          python .github/scripts/bedrock_review.py > review_output.md

      # 4. Post the generated Markdown review back to the PR
      - name: "Post Comment to PR"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reviewMarkdown = fs.readFileSync('review_output.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "### Amazon Bedrock Automated Code Review\n\n" + reviewMarkdown
            });

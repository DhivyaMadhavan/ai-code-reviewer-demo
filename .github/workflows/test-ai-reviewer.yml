name: "Code Review by Amazon Bedrock"

on:
  pull_request:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # Required for secure AWS OIDC login
      contents: read
      pull-requests: write # Allows writing comments on the PR
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Get the difference inside the YAML file itself (Your exact logic)
      - name: "Get diff of the pull request"
        id: get_diff
        shell: bash
        env:
          PULL_REQUEST_HEAD_REF: "${{ github.event.pull_request.head.ref }}"
          PULL_REQUEST_BASE_REF: "${{ github.event.pull_request.base.ref }}"
        run: |-
          git fetch origin "${{ env.PULL_REQUEST_HEAD_REF }}"
          git fetch origin "${{ env.PULL_REQUEST_BASE_REF }}"
          git checkout "${{ env.PULL_REQUEST_HEAD_REF }}"
          git diff "origin/${{ env.PULL_REQUEST_BASE_REF }}" > "diff.txt"
          {
            echo "pull_request_diff<<EOF";
            cat "diff.txt";
            echo 'EOF';
          } >> $GITHUB_OUTPUT

      # 2. Authenticate securely with AWS using OIDC
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/GitHubBedrockReviewerRole # Replace with your AWS IAM Role ARN
          aws-region: us-east-1

      # 3. Set up Python Environment on the runner
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 4. Run the decoupled Python script and save its terminal output
      - name: "Run Bedrock Review Script"
        id: run_review
        env:
          PR_DIFF: ${{ steps.get_diff.outputs.pull_request_diff }}
        run: |
          pip install boto3
          
          # Run the script and write its raw output to a local Markdown file
          python .github/scripts/bedrock_review.py > review_output.md

      # 5. Post the generated Markdown review back to the PR comments section
      - name: "Post Comment to PR"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reviewMarkdown = fs.readFileSync('review_output.md', 'utf8');
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "### 🤖 Amazon Bedrock Automated Code Review\n\n" + reviewMarkdown
            });
